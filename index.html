<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37ch</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>37ch</h1>
        </div>
        <div class="board-list" id="boardList"></div>
    </div>

    <div id="boardTitle" class="board-title">/b/ - Random</div>

    <div class="post-form" id="postFormArea">
        <div class="form-row">
            <input type="text" id="postName" placeholder="Name (optional, tripcode: #name#key)" autocomplete="off">
            <input type="text" id="postSubject" placeholder="Subject" autocomplete="off">
        </div>
        <div class="form-row">
            <textarea id="postComment" placeholder="Comment... use >>123 to quote"></textarea>
        </div>
        <div class="form-row">
            <label class="file-label">Images (max 4):</label>
            <input type="file" id="postImages" accept="image/*" multiple class="file-input">
        </div>
        <div class="sage-check">
            <input type="checkbox" id="sageMode">
            <label for="sageMode">Sage (does not bump thread)</label>
        </div>
        <div class="h-captcha" data-sitekey="YOUR_HCAPTCHA_SITEKEY"></div>
        <input type="text" id="postWebsite" class="spam-check" tabindex="-1" autocomplete="off">
        <div style="margin-top: 12px; display: flex; gap: 12px; align-items: center;">
            <button id="createThreadBtn">Create new thread</button>
            <span style="font-size: 0.7rem;">⬤ anonymous / tripcode supported / OP can manage threads</span>
        </div>
    </div>

    <div id="threadsContainer"><div class="loading-spinner">Loading threads...</div></div>
    <div class="footer">37ch</div>
</div>

<div id="replyModal" class="reply-modal" style="display: none;">
    <div class="reply-modal-content">
        <div class="reply-modal-header">
            <span id="replyModalTitle">Reply to thread</span>
            <span class="reply-modal-close">&times;</span>
        </div>
        <div class="form-row">
            <input type="text" id="replyName" placeholder="Name (optional, tripcode: #name#key)" autocomplete="off">
        </div>
        <div class="form-row">
            <textarea id="replyComment" placeholder="Comment..." rows="4"></textarea>
        </div>
        <div class="form-row">
            <label class="file-label">Images (max 4):</label>
            <input type="file" id="replyImages" accept="image/*" multiple class="file-input">
        </div>
        <div class="sage-check">
            <input type="checkbox" id="replySage">
            <label>Sage (does not bump thread)</label>
        </div>
        <div class="h-captcha" data-sitekey="YOUR_HCAPTCHA_SITEKEY"></div>
        <input type="text" id="replyWebsite" class="spam-check" tabindex="-1" autocomplete="off">
        <div style="margin-top: 12px; display: flex; gap: 12px; justify-content: flex-end;">
            <button id="replyModalCancel">Cancel</button>
            <button id="replyModalSubmit">Post reply</button>
        </div>
    </div>
</div>

<script src="vendor/supabase-js.js"></script>
<script src="script.js"></script>
</body>
</html>
